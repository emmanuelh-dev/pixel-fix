<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128">
  <defs>
    <!-- Gradiente de fondo del círculo (Azul oscuro / Negro premium) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121824" />
      <stop offset="100%" stop-color="#080B11" />
    </linearGradient>

    <!-- Gradiente para el destello (Sparkle) -->
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>

    <!-- Gradiente para el mango del destornillador -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B5263" />
      <stop offset="100%" stop-color="#1F232D" />
    </linearGradient>

    <!-- Gradiente para la punta de metal -->
    <linearGradient id="shaftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#9AA0A6" />
    </linearGradient>
  </defs>

  <style>
    .bg-circle { fill: url(#bgGrad); stroke: #1E293B; stroke-width: 2; }
    @media (prefers-color-scheme: dark) {
      .bg-circle { stroke: #334155; }
    }
  </style>

  <!-- Círculo de fondo principal -->
  <circle cx="64" cy="64" r="58" class="bg-circle" />

  <!-- Destornillador rotado 45 grados para quedar diagonal -->
  <g transform="rotate(45, 64, 64)">
    <!-- Mango del destornillador -->
    <rect x="56" y="68" width="16" height="38" rx="6" fill="url(#handleGrad)" stroke="#0D0E12" stroke-width="2.5" />
    <!-- Líneas de agarre del mango -->
    <line x1="60" y1="74" x2="60" y2="96" stroke="#1F232D" stroke-width="2" stroke-linecap="round" />
    <line x1="68" y1="74" x2="68" y2="96" stroke="#1F232D" stroke-width="2" stroke-linecap="round" />
    
    <!-- Vástago metálico -->
    <rect x="61" y="38" width="6" height="30" fill="url(#shaftGrad)" stroke="#1F232D" stroke-width="0.5" />
    
    <!-- Punta plana del destornillador -->
    <polygon points="59,38 69,38 67,32 61,32" fill="url(#shaftGrad)" stroke="#1F232D" stroke-width="0.5" />
  </g>

  <!-- Destello (Sparkle) en la punta del destornillador (87, 41) -->
  <g transform="translate(87, 41)">
    <!-- Resplandor suave -->
    <circle cx="0" cy="0" r="18" fill="#00F0FF" opacity="0.15" />
    <circle cx="0" cy="0" r="8" fill="#0066FF" opacity="0.25" />
    
    <!-- Destello estrella exterior grande -->
    <path d="M 0 -18 Q 0 0 18 0 Q 0 0 0 18 Q 0 0 -18 0 Q 0 0 0 -18 Z" fill="url(#sparkleGrad)" />
    <!-- Destello estrella interna blanca brillante -->
    <path d="M 0 -8 Q 0 0 8 0 Q 0 0 0 8 Q 0 0 -8 0 Q 0 0 0 -8 Z" fill="#FFFFFF" />
  </g>

  <!-- Píxel flotante azul brillante (representando la reparación completada) -->
  <rect x="94" y="60" width="10" height="10" rx="2" fill="#00F0FF" opacity="0.85" transform="rotate(15, 99, 65)" />
</svg>
